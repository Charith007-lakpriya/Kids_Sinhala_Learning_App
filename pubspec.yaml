name: valipilla
description: Sinhala learning app UI (Flutter)
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  firebase_core: 4.6.0
  cloud_firestore: ^6.0.0
  audioplayers: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/audio/bg_music.mp3
    - assets/audio/tap.wav
    - assets/audio/correct.wav
    - assets/audio/wrong.wav
    - assets/audio/level_up.wav
    - assets/audio/sound_recognition/
    - assets/icons/games/
    - assets/avatars/
